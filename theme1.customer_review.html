<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>用户体验分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fb}
.header{background:#0f172a;color:#fff;padding:24px}
.container{max-width:1400px;margin:auto;padding:20px}

.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.filter{background:#fff;padding:12px;border-radius:10px}
select{width:100%;padding:8px;border-radius:8px}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;padding:18px;border-radius:12px}
.kpi p{font-size:13px;color:#667085}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:#fff;padding:16px;border-radius:12px}
.chart{height:320px}

.home-btn{
margin-top:10px;
padding:6px 12px;
border:none;
border-radius:6px;
background:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>用户体验分析看板</h2>

<button class="home-btn" onclick="goHome()">← 返回首页</button>

<p>
基于评论与客诉数据，从“差评问题”与“用户亮点反馈”双视角评估产品体验。
</p>
</div>

<div class="container">

<!-- 筛选 -->
<div class="filters">
<div class="filter">国家<select><option>All</option><option>US</option><option>UK</option><option>DE</option></select></div>
<div class="filter">产品<select><option>V0.7一型整桌</option><option>V0.7L型整桌</option></select></div>
<div class="filter">SKU<select><option>全部</option></select></div>
<div class="filter">周期<select><option>近6个月</option></select></div>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi">
<h2>0.18%</h2>
差评率
<p>1-3星订单占比，反映产品基础体验问题</p>
</div>

<div class="kpi">
<h2>0.25%</h2>
客诉率
<p>客服反馈问题占比，反映用户使用过程问题</p>
</div>

<div class="kpi">
<h2>12.3%</h2>
MOT提及率
<p>用户主动提及亮点比例，验证产品卖点是否成立</p>
</div>
</div>

<!-- 趋势 -->
<div class="grid">
<div class="card">
<h3>差评率趋势</h3>
<p>观察质量问题是否改善</p>
<div id="c1" class="chart"></div>
</div>

<div class="card">
<h3>客诉率趋势</h3>
<p>观察用户使用问题变化</p>
<div id="c2" class="chart"></div>
</div>
</div>

<!-- 结构 -->
<div class="grid">
<div class="card">
<h3>差评问题结构</h3>
<p>识别核心质量问题</p>
<div id="c3" class="chart"></div>
</div>

<div class="card">
<h3>客诉问题结构</h3>
<p>识别用户投诉来源</p>
<div id="c4" class="chart"></div>
</div>
</div>

<!-- MOT -->
<div class="card">
<h3>MOT亮点分析</h3>
<p>用户主动提及的产品优势</p>
<div id="c5" class="chart"></div>
</div>

</div>

<script>

// 返回首页
function goHome(){
  window.location.href="index.html"
}

// 差评趋势
echarts.init(c1).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:["10月","11月","12月","1月","2月"]},
yAxis:{},
series:[{
type:"line",
data:[0.3,0.28,0.22,0.2,0.18],
label:{show:true,formatter:'{c}%'}
}]
})

// 客诉趋势
echarts.init(c2).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:["10月","11月","12月","1月","2月"]},
yAxis:{},
series:[{
type:"line",
data:[0.4,0.35,0.3,0.27,0.25],
label:{show:true,formatter:'{c}%'}
}]
})

// 差评结构
echarts.init(c3).setOption({
tooltip:{trigger:'item'},
series:[{
type:"pie",
data:[
{value:40,name:"功能"},
{value:25,name:"包装"},
{value:20,name:"材质"},
{value:15,name:"外观"}
]
}]
})

// 客诉结构
echarts.init(c4).setOption({
tooltip:{trigger:'item'},
series:[{
type:"pie",
data:[
{value:35,name:"物流"},
{value:30,name:"缺件"},
{value:20,name:"安装"},
{value:15,name:"服务"}
]
}]
})

// MOT
echarts.init(c5).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:["稳定","升降顺滑","外观好","性价比"]},
yAxis:{},
series:[{
type:"bar",
data:[30,25,20,15],
label:{show:true}
}]
})

</script>

</body>
</html>
