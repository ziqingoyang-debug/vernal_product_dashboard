<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品数据分析看板</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #0b1a2f;
            color: #fff;
        }

        .container {
            padding: 60px;
            max-width: 1200px;
            margin: auto;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            margin-top: 10px;
            color: #94a3b8;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background: linear-gradient(145deg, #142a4a, #0b1a2f);
            border-radius: 18px;
            padding: 28px;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .footer {
            margin-top: 80px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">📊 产品数据分析看板</div>
    <div class="subtitle">从用户体验 → 商业结果 → 搭售生态，全链路洞察</div>

    <div class="grid">

        <!-- 用户体验分析 -->
        <a href="theme1.customer_review.html">
            <div class="card">
                <div class="card-title">用户体验分析</div>
                <div class="card-desc">
                    聚焦验证产品核心卖点是否成立、基础体验是否存在问题，
                    支撑追踪竞品VOC与用户真实反馈。
                </div>
            </div>
        </a>

        <!-- 商业成果分析 -->
        <a href="https://bi.aliyuncs.com/token3rd/dashboard/view/pc.htm?pageId=04d9cd42-049f-4342-ad36-03c36faa3af4&accessTicket=4ab66828-d939-4885-91a8-62aeffe84c84&dd_orientation=auto" 
           target="_blank" 
           rel="noopener noreferrer">
            <div class="card">
                <div class="card-title">商业成果追踪分析</div>
                <div class="card-desc">
                    跟踪销量、运营销售收入、产品定价毛利等关键指标，
                    评估业务表现与策略效果。
                </div>
            </div>
        </a>

        <!-- 搭售分析 -->
        <a href="bundle.html">
            <div class="card">
                <div class="card-title">搭售生态分析</div>
                <div class="card-desc">
                    分析商品搭售结构与行为路径，
                    优化组合策略，提升客单与利润。
                </div>
            </div>
        </a>

    </div>

    <div class="footer">
        © Vernal Data Dashboard · Powered by GitHub Pages
    </div>

</div>

</body>
</html>
