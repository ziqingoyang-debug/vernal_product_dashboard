<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品数据看板</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #0f172a;
            color: #fff;
        }

        .container {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(59,130,246,0.4);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
        }

        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">📊 产品数据分析看板</div>
        <div class="subtitle">从用户体验 → 商业结果 → 搭售生态，全链路洞察</div>

        <div class="grid">

            <!-- 模块1 -->
            <div class="card" onclick="goTo('ux.html')">
                <div class="card-title">用户体验分析</div>
                <div class="card-desc">
                    聚焦验证产品核心卖点是否成立、基础体验是否存在问题，
                    支撑追踪竟品VOC。
                </div>
            </div>

            <!-- 模块2 -->
            <div class="card" onclick="goTo('business.html')">
                <div class="card-title">商业成果追踪分析</div>
                <div class="card-desc">
                    跟踪销量、收入、产品定价毛利润&毛利率等关键指标，
                    评估业务表现与策略效果。
                </div>
            </div>

            <!-- 模块3 -->
            <div class="card" onclick="goTo('bundle.html')">
                <div class="card-title">搭售生态分析</div>
                <div class="card-desc">
                    分析商品搭售结构与行为路径，
                    优化组合策略。
                </div>
            </div>

        </div>

        <div class="footer">
            © Vernal Data Dashboard · Powered by GitHub Pages
        </div>
    </div>

    <script>
        function goTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
