<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>📊 3.搭售生态分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0b1220;color:#e5e7eb}
.header{background:linear-gradient(135deg,#020617,#0f172a);padding:28px}
.container{max-width:1400px;margin:auto;padding:20px}

.home-btn{margin-top:10px;padding:8px 14px;border-radius:8px;border:none;background:#fff;cursor:pointer}

.filters{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.filter{background:#111827;padding:12px;border-radius:10px}

select{width:100%;background:#020617;color:#fff;padding:6px;border-radius:6px;border:1px solid #334155}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#020617;padding:16px;border-radius:10px}
.value{font-size:24px;font-weight:bold}

.card{background:#111827;padding:16px;border-radius:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart{height:320px}

.section-title{font-size:18px;font-weight:bold;margin-bottom:10px}
.note{font-size:12px;color:#94a3b8;margin-top:6px}
</style>
</head>

<body>

<div class="header">
<h2>搭售生态分析看板</h2>
<button class="home-btn">← 返回首页</button>
</div>

<div class="container">

<!-- KPI -->
<div class="card">
<h3>1.1 整体搭售能力</h3>
<div class="kpis">
<div class="kpi"><div class="value">10</div>主销品销量</div>
<div class="kpi"><div class="value">7</div>搭售销量</div>
<div class="kpi"><div class="value">70%</div>搭售率</div>
<div class="kpi"><div class="value">$290</div>搭售金额</div>
</div>
</div>

<!-- 标题 -->
<div class="card">
<h3>1.2 搭售结构分析</h3>
</div>

<!-- 图1 -->
<div class="grid">

<div class="card">
<h3>1.2 不同配件搭售率</h3>
<div id="c1" class="chart"></div>
</div>

<div class="card">
<h3>不同配件搭售金额（单位：$）</h3>
<div class="note">搭售占比相加 = 100%</div>
<div id="c2" class="chart"></div>
</div>

</div>

<!-- 新增模块 -->
<div class="card">
<h3>选定特定搭售件</h3>

<select>
<option>小高台</option>
<option>V系列边柜</option>
</select>

</div>

<div class="grid">

<div class="card">
<h3>搭售率趋势</h3>
<div id="c8" class="chart"></div>
</div>

<div class="card">
<h3>搭售金额趋势</h3>
<div id="c9" class="chart"></div>
</div>

</div>

</div>

<script>

const c1 = document.getElementById('c1')
const c2 = document.getElementById('c2')
const c8 = document.getElementById('c8')
const c9 = document.getElementById('c9')

const acc=["小高台","V边柜","线缆","键盘托"]
const rate=[70,50,30,20]
const amount=[200,150,80,40]
const total=amount.reduce((a,b)=>a+b,0)
const percent=amount.map(v=>(v/total*100).toFixed(2))

/* ===== 1. 左图改折线 ===== */
echarts.init(c1).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:acc},
yAxis:{name:'搭售率(%)'},
series:[{
type:'line',
data:rate,
smooth:true,
label:{show:true,formatter:'{c}%'}
}]
})

/* ===== 2. 右图去折线 ===== */
echarts.init(c2).setOption({
tooltip:{
trigger:'axis',
formatter:(p)=>{
let i=p[0].dataIndex
return `${acc[i]}<br>金额:$${amount[i]}<br>占比:${percent[i]}%`
}
},
xAxis:{data:acc},
yAxis:{name:'搭售金额($)'},
series:[{
type:'bar',
data:amount,
label:{
show:true,
formatter:(p)=>`$${p.value}\n${percent[p.dataIndex]}%`
}
}]
})

/* ===== 3. 新增趋势图 ===== */

const months=[
"2025-07","2025-08","2025-09","2025-10",
"2025-11","2025-12","2026-01","2026-02","2026-03"
]

const trendRate=[40,45,50,55,60,62,65,68,70]
const trendAmount=[80,90,100,120,140,150,160,180,200]

/* 折线 */
echarts.init(c8).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:months},
yAxis:{name:'搭售率(%)'},
series:[{
type:'line',
data:trendRate,
smooth:true,
label:{show:true,formatter:'{c}%'}
}]
})

/* 柱状 */
echarts.init(c9).setOption({
tooltip:{trigger:'axis'},
xAxis:{data:months},
yAxis:{name:'搭售金额($)'},
series:[{
type:'bar',
data:trendAmount,
label:{show:true}
}]
})

</script>

</body>
</html>
