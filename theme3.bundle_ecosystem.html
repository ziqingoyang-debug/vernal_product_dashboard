<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>搭售生态分析 V2</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fb}
.header{background:#0f172a;color:#fff;padding:20px}
.container{max-width:1400px;margin:auto;padding:20px}

/* ⭐ 筛选器优化 */
.filters{
display:flex;
gap:15px;
margin-bottom:25px;
}
select{
padding:10px 12px;
border-radius:10px;
border:1px solid #dbe3ef;
background:#fff;
font-size:14px;
}

/* KPI */
.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}
.kpi{
background:#fff;
padding:18px;
border-radius:12px;
}

/* 布局 */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:16px;
border-radius:12px;
}

.chart{height:360px}

/* 表格 */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}

.tag{padding:4px 10px;border-radius:20px;font-size:12px}
.green{background:#e8f7ee;color:#117a37}
.yellow{background:#fff6df;color:#9a6700}
.red{background:#fdecec;color:#b42318}
</style>
</head>

<body>

<div class="header">
<h2>搭售生态分析 V2</h2>
</div>

<div class="container">

<!-- ✅ 筛选器 -->
<div class="filters">
<select id="product"></select>
<select id="country">
<option value="ALL">全部国家</option>
<option>US</option>
<option>CA</option>
<option>UK</option>
<option>DE</option>
</select>
<select id="acc"></select>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi"><h2 id="k1"></h2><p>主销品销量</p></div>
<div class="kpi"><h2 id="k2"></h2><p>搭售率</p></div>
<div class="kpi"><h2 id="k3"></h2><p>搭售金额</p></div>
<div class="kpi"><h2 id="k4"></h2><p>搭售单产</p></div>
</div>

<!-- 图 -->
<div class="grid">
<div class="card"><h3>搭售率</h3><div id="c1" class="chart"></div></div>
<div class="card"><h3>搭售金额</h3><div id="c2" class="chart"></div></div>
<div class="card"><h3>国家差异</h3><div id="c3" class="chart"></div></div>
<div class="card"><h3>结构</h3><div id="c4" class="chart"></div></div>
</div>

<!-- 四象限 -->
<div class="card">
<h3>四象限分析</h3>
<div id="c5" class="chart" style="height:420px"></div>
</div>

<!-- 表 -->
<div class="card">
<h3>SKU决策清单</h3>
<table>
<thead><tr><th>配件</th><th>金额</th><th>搭售率</th><th>标签</th></tr></thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// 数据
const products=["V0.7一型整桌","V0.7一型老板桌","V0.7L型整桌","V0.7L型老板桌"]
const accs=["小高台","V系列边柜","线缆挂件","键盘托"]

const data={
"V0.7一型整桌":{sales:1800,rate:[45,38,25,20],rev:[5,3.8,2.5,2]},
"V0.7一型老板桌":{sales:1500,rate:[40,32,28,22],rev:[4.5,3.2,2.3,1.8]},
"V0.7L型整桌":{sales:1400,rate:[42,30,26,19],rev:[4.2,3,2.1,1.5]},
"V0.7L型老板桌":{sales:1300,rate:[38,29,24,18],rev:[4,2.8,2,1.3]}
}

// 初始化
const pSel=document.getElementById("product")
const aSel=document.getElementById("acc")

products.forEach(p=>{
let o=document.createElement("option")
o.value=p;o.textContent=p
pSel.appendChild(o)
})

accs.forEach(a=>{
let o=document.createElement("option")
o.value=a;o.textContent=a
aSel.appendChild(o)
})

// 图
const c1=echarts.init(document.getElementById("c1"))
const c2=echarts.init(document.getElementById("c2"))
const c3=echarts.init(document.getElementById("c3"))
const c4=echarts.init(document.getElementById("c4"))
const c5=echarts.init(document.getElementById("c5"))

function render(){

let d=data[pSel.value]

// KPI
let rateAvg=d.rate.reduce((a,b)=>a+b)/d.rate.length
let revSum=d.rev.reduce((a,b)=>a+b)

k1.innerText=d.sales
k2.innerText=rateAvg.toFixed(1)+"%"
k3.innerText="¥"+revSum.toFixed(1)+"M"
k4.innerText="¥"+Math.round(revSum*1000000/d.sales)

// ⭐ tooltip全部加上
c1.setOption({
tooltip:{trigger:"axis"},
xAxis:{data:accs},
yAxis:{},
series:[{type:"line",data:d.rate}]
})

c2.setOption({
tooltip:{trigger:"axis"},
xAxis:{data:accs},
yAxis:{},
series:[{type:"bar",data:d.rev}]
})

c3.setOption({
tooltip:{trigger:"axis"},
xAxis:{data:["US","CA","UK","DE"]},
yAxis:{},
series:[{type:"bar",data:[30,25,22,28]}]
})

c4.setOption({
tooltip:{trigger:"item"},
series:[{type:"pie",data:[
{value:80,name:"搭售"},
{value:20,name:"单买"}
]}]
})

c5.setOption({
tooltip:{
formatter:p=>`${p.data[2]}<br>搭售率:${p.data[0]}%<br>金额:${p.data[1]}M`
},
xAxis:{name:"搭售率"},
yAxis:{name:"搭售金额"},
series:[{
type:"scatter",
data:accs.map((a,i)=>[d.rate[i],d.rev[i],a]),
label:{show:true,formatter:p=>p.data[2]}
}]
})

// 表
table.innerHTML=accs.map((a,i)=>{
let tag="低效件",cls="red"
if(d.rev[i]>3){tag="核心件";cls="green"}
else if(d.rev[i]>2){tag="潜力件";cls="yellow"}

return `<tr>
<td>${a}</td>
<td>¥${d.rev[i]}M</td>
<td>${d.rate[i]}%</td>
<td><span class="tag ${cls}">${tag}</span></td>
</tr>`
}).join("")
}

pSel.onchange=render
render()

</script>

</body>
</html>
