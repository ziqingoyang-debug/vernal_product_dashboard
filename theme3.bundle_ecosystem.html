<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>搭售生态分析看板</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: #0b1a2f;
    color: #fff;
}

.header {
    padding: 20px 30px;
    background: #142a4a;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.chart {
    height: 400px;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 搭售生态分析看板</h2>
</div>

<div class="container">

    <div class="card">
        <h3>主销品搭售率</h3>
        <div id="chart1" class="chart"></div>
    </div>

    <div class="card">
        <h3>搭售金额</h3>
        <div id="chart2" class="chart"></div>
    </div>

</div>

<script>

const accessories = ["显示器支架","线缆管理","抽屉","v系列边柜","小高台","隐私挡板"]

const data = {
    rate: [42,36,28,18,12,6],
    revenue: [5.0,3.5,2.0,1.2,0.7,0.3]
}

// 图1
echarts.init(document.getElementById('chart1')).setOption({
    xAxis: { type: 'category', data: accessories },
    yAxis: { type: 'value' },
    series: [{
        type: 'line',
        data: data.rate
    }]
})

// 图2
echarts.init(document.getElementById('chart2')).setOption({
    xAxis: { type: 'category', data: accessories },
    yAxis: { type: 'value' },
    series: [{
        type: 'bar',
        data: data.revenue
    }]
})

</script>

</body>
</html>
