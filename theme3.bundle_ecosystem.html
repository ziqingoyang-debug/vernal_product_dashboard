<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Vernal 搭售生态分析看板 Demo</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fb;color:#1f2937}
.header{background:#0f172a;color:#fff;padding:24px}
.container{max-width:1400px;margin:auto;padding:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#fff;border-radius:14px;padding:16px}
.chart{height:360px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
.tag{padding:4px 10px;border-radius:20px;font-size:12px}
.green{background:#e8f7ee;color:#117a37}
.yellow{background:#fff6df;color:#9a6700}
.red{background:#fdecec;color:#b42318}
</style>
</head>

<body>

<div class="header">
<h2>Vernal 搭售生态分析看板 Demo</h2>
</div>

<div class="container">

<!-- KPI -->
<div class="kpis">
<div class="kpi"><h2 id="k1"></h2><p>主销品销量</p></div>
<div class="kpi"><h2 id="k2"></h2><p>整体搭售率</p></div>
<div class="kpi"><h2 id="k3"></h2><p>搭售金额</p></div>
<div class="kpi"><h2 id="k4"></h2><p>搭售单产</p></div>
</div>

<!-- 图 -->
<div class="grid">
<div class="card"><h3>搭售率</h3><div id="c1" class="chart"></div></div>
<div class="card"><h3>搭售金额</h3><div id="c2" class="chart"></div></div>
<div class="card"><h3>国家差异</h3><div id="c3" class="chart"></div></div>
<div class="card"><h3>结构</h3><div id="c4" class="chart"></div></div>
</div>

<!-- 四象限 -->
<div class="card">
<h3>四象限分析</h3>
<div id="c5" class="chart" style="height:420px"></div>
</div>

<!-- 分布 -->
<div class="grid">
<div class="card"><h3>配件贡献</h3><div id="c6" class="chart"></div></div>

<div class="card">
<h3>决策清单</h3>
<table>
<thead>
<tr><th>配件</th><th>搭售金额</th><th>占比</th><th>标签</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

</div>

<script>

const acc=["显示器支架","理线槽","抽屉","脚踏板","杯架","隐私挡板"]

const rate=[42,36,28,18,12,6]
const rev=[5,3.5,2,1.2,0.7,0.3]

// KPI
document.getElementById("k1").innerText=1820
document.getElementById("k2").innerText="142%"
document.getElementById("k3").innerText="¥12.7M"
document.getElementById("k4").innerText="¥6978"

// 图1
echarts.init(c1).setOption({
xAxis:{data:acc},yAxis:{},
series:[{type:'line',data:rate}]
})

// 图2
echarts.init(c2).setOption({
xAxis:{data:acc},yAxis:{},
series:[{type:'bar',data:rev}]
})

// 图3
echarts.init(c3).setOption({
xAxis:{data:["US","CA","UK","DE"]},
yAxis:{},
series:[{type:'bar',data:[31.5,27.3,25.4,29.8]}]
})

// 图4
echarts.init(c4).setOption({
series:[{type:'pie',data:[
{value:86,name:"搭售"},
{value:14,name:"单买"}
]}]
})

// 四象限
echarts.init(c5).setOption({
xAxis:{name:"搭售占比"},
yAxis:{name:"搭售金额"},
series:[{
type:"scatter",
data:[
[85,5,"显示器支架"],
[86,3.5,"理线槽"],
[85,2,"抽屉"],
[87,1.2,"脚踏板"]
],
label:{show:true,formatter:p=>p.data[2]}
}]
})

// 分布
echarts.init(c6).setOption({
xAxis:{data:["整桌A","整桌B","整桌C","整桌D"]},
yAxis:{},
series:[{type:"bar",data:[5,4.3,5.6,5.2]}]
})

// 表格
const rows=acc.map((a,i)=>{
let tag="低效件",cls="red"
if(rev[i]>2){tag="核心件";cls="green"}
else if(rev[i]>1){tag="潜力件";cls="yellow"}
return `<tr>
<td>${a}</td>
<td>¥${rev[i]}M</td>
<td>${rate[i]}%</td>
<td><span class="tag ${cls}">${tag}</span></td>
</tr>`
})

document.getElementById("table").innerHTML=rows.join("")

</script>

</body>
</html>
