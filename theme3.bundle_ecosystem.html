<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>📊 3. 搭售生态分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{
    background:#071c34;
    color:#fff;
    font-family:Arial;
    margin:0;
}
.container{padding:20px;}
.card{
    background:#0d2645;
    padding:16px;
    border-radius:10px;
    margin-bottom:20px;
}
.row{display:flex;gap:16px;}
.metric{
    flex:1;
    background:#081a33;
    padding:16px;
    border-radius:8px;
}
.chart{height:400px;}
.big-chart{height:520px;}
select{
    width:100%;
    padding:8px;
    background:#081a33;
    color:#fff;
    border:1px solid #2b3f5c;
}
</style>
</head>

<body>
<div class="container">

<h2>搭售生态分析看板</h2>

<!-- 顶部筛选 -->
<div class="card">
国家
<select>
<option>All</option>
<option>US</option>
<option>CA</option>
</select>

销售月份
<select>
<option>2026-03</option>
<option>2026-02</option>
</select>
</div>

<!-- 一、主销品视角 -->
<h3>一、主销品视角</h3>

<div class="card">
主销品筛选
<select>
<option>All</option>
<option>v0.7一型整桌</option>
<option>v0.7一型老板桌</option>
<option>v0.7L型整桌</option>
<option>v0.7L老板桌</option>
</select>
</div>

<!-- 1.1 -->
<div class="card">
<h4>1.1 主销品搭售结构</h4>
<div class="row">
<div class="metric">主销品销量<br><b>10</b></div>
<div class="metric">搭售销量<br><b>7</b></div>
<div class="metric">搭售率<br><b>70%</b></div>
<div class="metric">搭售金额<br><b>$290</b></div>
</div>
</div>

<!-- 1.2 -->
<div class="card">
<h4>1.2 搭售结构分析</h4>
<div class="row">
<div id="c_rate" class="chart"></div>
<div id="c_amount" class="chart"></div>
</div>
</div>

<!-- 1.3 -->
<div class="card">
<h4>1.3 主销品 × 搭售件矩阵</h4>
<div id="c_matrix" class="big-chart"></div>
</div>

<!-- 二、搭售件视角 -->
<h3>二、搭售件视角</h3>

<div class="card">
搭售件筛选
<select>
<option>All</option>
<option>小高台</option>
<option>V边柜</option>
<option>键盘托</option>
<option>线缆</option>
</select>
</div>

<!-- 2.1 -->
<div class="card">
<h4>2.1 搭售件整体能力</h4>
<div class="row">
<div class="metric">搭售销量<br><b>8</b></div>
<div class="metric">单独销量<br><b>2</b></div>
<div class="metric">搭售金额<br><b>$400</b></div>
<div class="metric">搭售占比<br><b>53%</b></div>
</div>
</div>

<!-- 2.2 -->
<div class="card">
<h4>2.2 主销品来源分析</h4>
<div id="c_source" class="chart"></div>
</div>

<!-- 2.3 -->
<div class="card">
<h4>2.3 搭售结构分析</h4>
<div id="c_struct" class="chart"></div>
</div>

<!-- 2.4 -->
<div class="card">
<h4>2.4 配件四象限分析</h4>
<div id="c_quad" class="big-chart"></div>
</div>

<!-- 2.5 -->
<div class="card">
<h4>2.5 搭售金额分布</h4>
<div id="c_dist" class="chart"></div>
</div>

<!-- 2.6 -->
<div class="card">
<h4>2.6 低效/潜力搭售件</h4>
<table width="100%">
<tr><th>配件</th><th>销量</th><th>金额</th><th>占比</th><th>毛利</th><th>标签</th></tr>
<tr><td>显示器支架</td><td>2624</td><td>$20.1M</td><td>85%</td><td>61%</td><td style="color:#00ff9c">核心件</td></tr>
<tr><td>隐私挡板</td><td>318</td><td>$0.96M</td><td>85%</td><td>37%</td><td style="color:red">低效件</td></tr>
</table>
</div>

</div>

<script>

/* 延迟初始化（防空白） */
setTimeout(()=>{

/* 1.2 搭售率 */
echarts.init(c_rate).setOption({
tooltip:{},
xAxis:{data:['小高台','V边柜','线缆','键盘托']},
yAxis:{},
series:[{type:'bar',data:[70,50,30,20],label:{show:true}}]
});

/* 1.2 金额 */
echarts.init(c_amount).setOption({
tooltip:{},
xAxis:{data:['小高台','V边柜','线缆','键盘托']},
yAxis:{},
series:[{type:'bar',data:[200,150,80,40],label:{show:true}}]
});

/* 1.3 气泡 */
echarts.init(c_matrix).setOption({
tooltip:{formatter:p=>`${p.data.name}<br>率:${p.value[0]}%<br>金额:$${p.value[1]}<br>销量:${p.value[2]}`},
xAxis:{name:'搭售率'},
yAxis:{name:'金额'},
series:[{
type:'scatter',
label:{show:true,formatter:p=>p.data.name},
symbolSize:d=>d[2]*15,
data:[
{name:'小高台',value:[70,200,5]},
{name:'V边柜',value:[50,150,4]},
{name:'线缆',value:[30,80,3]},
{name:'键盘托',value:[20,40,2]}
]
}]
});

/* 2.2 来源 */
echarts.init(c_source).setOption({
tooltip:{},
xAxis:{data:['整桌','L桌','行政桌']},
yAxis:{},
series:[{type:'bar',data:[5,3,2],label:{show:true}}]
});

/* 2.3 结构 */
echarts.init(c_struct).setOption({
tooltip:{},
series:[{
type:'pie',
radius:['40%','70%'],
data:[
{name:'搭售',value:53},
{name:'单独',value:47}
]
}]
});

/* 2.4 四象限 */
echarts.init(c_quad).setOption({
tooltip:{formatter:p=>`${p.data.name}<br>占比:${p.value[0]}%<br>金额:$${p.value[1]}<br>销量:${p.value[2]}`},
xAxis:{name:'占比'},
yAxis:{name:'金额'},
series:[{
type:'scatter',
label:{show:true,formatter:p=>p.data.name},
symbolSize:d=>d[2]/20,
data:[
{name:'显示器支架',value:[85,20000000,2600]},
{name:'理线槽',value:[86,13700000,2100]},
{name:'抽屉',value:[85,7900000,1600]},
{name:'脚踏板',value:[87,4900000,1100]},
{name:'杯架',value:[75,2600000,700]},
{name:'隐私挡板',value:[85,960000,318]}
]
}]
});

/* 2.5 分布 */
echarts.init(c_dist).setOption({
tooltip:{formatter:p=>`$${p.value}`},
xAxis:{data:['整桌','L桌','行政桌','L行政桌']},
yAxis:{},
series:[{type:'bar',data:[5000000,4300000,5600000,5200000],label:{show:true}}]
});

},500);

</script>

</body>
</html>
