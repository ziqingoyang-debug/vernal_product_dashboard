<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>搭售生态分析看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial;}
.container{max-width:1400px;margin:auto;padding:20px;}
.header{padding:20px;background:linear-gradient(135deg,#020617,#0f172a);}
button{padding:6px 12px;border-radius:6px;border:none;cursor:pointer}
select{width:100%;padding:8px;background:#020617;color:#fff;border:1px solid #334155;border-radius:6px;margin-top:6px}

.section-title{font-size:22px;margin:30px 0 10px}
.card{background:#111827;padding:16px;border-radius:12px;margin-bottom:20px}

.chart{height:400px}
.big-chart{height:520px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:#020617;padding:12px;border-radius:10px}
.value{font-size:22px;font-weight:bold}

.desc{font-size:12px;color:#94a3b8;margin-top:6px;line-height:1.6}
</style>
</head>

<body>

<div class="header">
<h2>搭售生态分析看板</h2>
<button onclick="location.href='index.html'">返回首页</button>
</div>

<div class="container">

<!-- 顶部筛选 -->
<div class="card">
国家<select><option>All</option></select>
销售月份<select><option>2026-03</option></select>
</div>

<!-- 主销品 -->
<div class="section-title">一、主销品视角</div>

<div class="card">
主销品筛选
<select>
<option>All</option>
<option>v0.7一型整桌</option>
<option>v0.7一型老板桌</option>
<option>v0.7L型整桌</option>
<option>v0.7L老板桌</option>
</select>
</div>

<!-- KPI -->
<div class="card">
<h3>1.1 主销品搭售结构分析</h3>

<div class="kpis">
<div class="kpi"><div class="value">10</div>主销品销量<div class="desc">订单数</div></div>
<div class="kpi"><div class="value">7</div>搭售销量<div class="desc">被带出数量</div></div>
<div class="kpi"><div class="value">70%</div>搭售率<div class="desc">搭售/主销</div></div>
<div class="kpi"><div class="value">$290</div>搭售金额<div class="desc">配件收入</div></div>
</div>

</div>

<!-- 气泡 -->
<div class="card">
<h3>1.3 主销品 × 搭售件矩阵</h3>
<div id="c1" class="big-chart"></div>
</div>

<!-- 搭售件 -->
<div class="section-title">二、搭售件视角</div>

<div class="card">
搭售件筛选
<select>
<option>All</option>
<option>V边柜</option>
<option>小高台</option>
<option>键盘托</option>
<option>线缆挂件</option>
</select>
</div>

<!-- KPI -->
<div class="card">
<h3>2.1 搭售件整体能力</h3>

<div class="kpis">
<div class="kpi"><div class="value">8</div>搭售销量</div>
<div class="kpi"><div class="value">2</div>单独销量</div>
<div class="kpi"><div class="value">$400</div>搭售金额</div>
<div class="kpi"><div class="value">53%</div>搭售占比</div>
</div>

</div>

<!-- 图 -->
<div class="card"><h3>2.2 主销品来源</h3><div id="c2" class="chart"></div></div>
<div class="card"><h3>2.3 搭售结构</h3><div id="c3" class="chart"></div></div>
<div class="card"><h3>2.4 四象限</h3><div id="c4" class="big-chart"></div></div>
<div class="card"><h3>2.5 金额分布</h3><div id="c5" class="chart"></div></div>

</div>

<script>

function initCharts(){

// 1.3
echarts.init(document.getElementById('c1')).setOption({
tooltip:{formatter:p=>`${p.data.name}<br>率:${p.value[0]}%<br>金额:$${p.value[1]}<br>销量:${p.value[2]}`},
series:[{
type:'scatter',
label:{show:true,formatter:p=>p.data.name},
symbolSize:d=>d[2]*20,
data:[
{name:"小高台",value:[70,200,5]},
{name:"V边柜",value:[50,150,4]},
{name:"线缆",value:[30,80,3]},
{name:"键盘托",value:[20,40,2]}
]
}]
})

// 2.2
echarts.init(document.getElementById('c2')).setOption({
tooltip:{},
series:[{type:'bar',data:[5,3,2],label:{show:true}}]
})

// 2.3
echarts.init(document.getElementById('c3')).setOption({
series:[{
type:'pie',
radius:['40%','70%'],
data:[
{name:"搭售",value:53},
{name:"单独",value:47}
]
}]
})

// 2.4
echarts.init(document.getElementById('c4')).setOption({
tooltip:{formatter:p=>`${p.data.name}<br>占比:${p.value[0]}%<br>金额:$${p.value[1]}<br>销量:${p.value[2]}`},
series:[{
type:'scatter',
label:{show:true,formatter:p=>p.data.name},
symbolSize:d=>d[2]/20,
data:[
{name:"显示器支架",value:[85,20000000,2600]},
{name:"理线槽",value:[86,13700000,2100]},
{name:"隐私挡板",value:[85,960000,318]}
]
}]
})

// 2.5
echarts.init(document.getElementById('c5')).setOption({
tooltip:{},
series:[{
type:'bar',
data:[5000000,4300000,5600000],
label:{show:true}
}]
})

}

// ⭐关键修复
window.onload = function(){
setTimeout(initCharts,200);
}

</script>

</body>
</html>
