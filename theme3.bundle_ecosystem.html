<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Vernal 搭售生态分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fb;color:#1f2937}
.header{background:#0f172a;color:#fff;padding:24px}
.container{max-width:1500px;margin:auto;padding:20px}

.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.filter{background:#fff;padding:12px;border-radius:10px}
select{width:100%;padding:8px;border-radius:8px}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;padding:18px;border-radius:12px}
.kpi p{font-size:13px;color:#667085}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:#fff;padding:16px;border-radius:12px}
.desc{font-size:13px;color:#667085;margin-bottom:10px;line-height:1.6}
.chart{height:320px}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
.tag{padding:4px 10px;border-radius:20px;font-size:12px}
.green{background:#e8f7ee;color:#117a37}
.yellow{background:#fff6df;color:#9a6700}
.red{background:#fdecec;color:#b42318}
</style>
</head>

<body>

<div class="header">
<h2>Vernal 搭售生态分析看板 Demo</h2>
<p>从主销品带货能力 + 配件被带效率双视角分析，支撑搭售优化与SKU治理。</p>
</div>

<div class="container">

<!-- 筛选 -->
<div class="filters">
<div class="filter">国家<select><option>All</option><option>US</option><option>UK</option><option>DE</option></select></div>
<div class="filter">主销品<select>
<option>V0.7一型整桌</option>
<option>V0.7一型老板桌</option>
<option>V0.7L型整桌</option>
<option>V0.7L型老板桌</option>
</select></div>
<div class="filter">配件<select>
<option>小高台</option>
<option>V系列边柜</option>
<option>线缆挂件</option>
<option>键盘托</option>
</select></div>
<div class="filter">周期<select><option>近12个月</option></select></div>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi">
<h2>1820</h2>主销品销量
<p>衡量流量入口规模</p>
</div>
<div class="kpi">
<h2>42%</h2>搭售率
<p>主销品带出配件能力</p>
</div>
<div class="kpi">
<h2>¥12.7M</h2>搭售金额
<p>搭售带来的收入贡献</p>
</div>
</div>

<!-- 1+2 -->
<div class="grid">
<div class="card">
<h3>一、搭售率</h3>
<div class="desc">高搭售率=强推荐能力</div>
<div id="c1" class="chart"></div>
</div>

<div class="card">
<h3>二、搭售金额</h3>
<div class="desc">识别高价值配件</div>
<div id="c2" class="chart"></div>
</div>
</div>

<!-- 3+4 -->
<div class="grid">
<div class="card">
<h3>三、站点表现</h3>
<div class="desc">识别国家差异</div>
<div id="c3" class="chart"></div>
</div>

<div class="card">
<h3>四、搭售结构</h3>
<div class="desc">搭售 vs 单卖</div>
<div id="c4" class="chart"></div>
</div>
</div>

<!-- 5 -->
<div class="card">
<h3>五、四象限气泡图</h3>
<div class="desc">搭售率 × 搭售金额</div>
<div id="c5" class="chart"></div>
</div>

<!-- 6+7 -->
<div class="grid">
<div class="card">
<h3>六、配件分布</h3>
<div class="desc">配件贡献来源</div>
<div id="c6" class="chart"></div>
</div>

<div class="card">
<h3>七、识别清单</h3>
<table>
<thead>
<tr>
<th>配件</th>
<th>搭售销量</th>
<th>搭售金额</th>
<th>搭售占比</th>
<th>平均毛利率</th>
<th>标签</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

</div>

<script>

const acc=["小高台","V系列边柜","线缆挂件","键盘托"]

const rate1=[45,38,25,20]
const revenue=[5,3.8,2.5,2]

const rate2=[85.9,86.3,85.2,87.1]
const sales=[2624,2121,1659,1144]
const margin=[61.2,58.5,55.5,50]

// 图1
echarts.init(c1).setOption({
tooltip:{trigger:"axis"},
xAxis:{data:acc},
yAxis:{},
series:[{type:"line",data:rate1,label:{show:true,formatter:'{c}%'}}]
})

// 图2
echarts.init(c2).setOption({
tooltip:{trigger:"axis"},
xAxis:{data:acc},
yAxis:{},
series:[{type:"bar",data:revenue,label:{show:true,formatter:'¥{c}M'}}]
})

// 图3
echarts.init(c3).setOption({
tooltip:{trigger:"axis"},
xAxis:{data:["US","UK","DE"]},
yAxis:{},
series:[{type:"bar",data:[30,25,28],label:{show:true,formatter:'{c}%'}}]
})

// 图4
echarts.init(c4).setOption({
tooltip:{trigger:"item"},
series:[{type:"pie",radius:['40%','70%'],data:[
{value:80,name:"搭售"},
{value:20,name:"单卖"}
]}]
})

// 图5 气泡
echarts.init(c5).setOption({
tooltip:{
formatter:p=>`${p.data.name}<br>搭售率:${p.data.value[0]}%<br>金额:¥${p.data.value[1]}M`
},
xAxis:{name:"搭售率",max:100},
yAxis:{name:"搭售金额"},
series:[{
type:"scatter",
data:acc.map((a,i)=>({
name:a,
value:[rate2[i],revenue[i]],
symbolSize:sales[i]/30
})),
label:{show:true,formatter:p=>p.data.name},
itemStyle:{color:"#5B7BEA"}
}],
markLine:{silent:true,data:[{xAxis:50},{yAxis:3}]}
})

// 图6
echarts.init(c6).setOption({
tooltip:{trigger:"axis"},
xAxis:{data:["一型整桌","老板桌","L整桌","L老板桌"]},
yAxis:{},
series:[{type:"bar",data:[5,4.3,5.6,5.2],label:{show:true,formatter:'¥{c}M'}}]
})

// 表
table.innerHTML=acc.map((a,i)=>{
let tag="低效件",cls="red"

if(rate2[i]>80 && revenue[i]>3){
tag="核心件";cls="green"
}else if(rate2[i]<80 && revenue[i]>3){
tag="潜力件";cls="yellow"
}

return `<tr>
<td>${a}</td>
<td>${sales[i]}</td>
<td>¥${revenue[i]}M</td>
<td>${rate2[i]}%</td>
<td>${margin[i]}%</td>
<td><span class="tag ${cls}">${tag}</span></td>
</tr>`
}).join("")

</script>

</body>
</html>
